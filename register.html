<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>


   <link rel="stylesheet" href="css/register.css">


    <form action="">

        <legend><marquee behavior="" direction="">Join Us and Start Your Journey Today!! </marquee></legend> <br>


        <label for="fname">Account for your First Name :</label>
        <input type="text" placeholder="Enter FirstName" id="fname"required> <br><br>

         <label for="sname">Account for your Surname Name :</label>
        <input type="text" placeholder="Enter Surname" id="sname" required> <br><br>

         <label for="email">Account for your E-Mail Adddress :</label>
        <input type="email" placeholder="e.g abc@gmail.com" id="email" required> <br><br>

         <label for="pwd">Account for your password :</label>
        <input type="password" placeholder="Enter password" id="pwd" required> <br><br>

        <label for="pwd">Confirm your password :</label>
        <input type="password" placeholder="Confirm password" id="pwd" required> <br><br>


        <label for="phone">Account for your Phone Number :</label>
        <input type="tel" placeholder="e.g 0712345678" id="fname" required> <br><br>

        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" required><br><br>

        <label for="dt">Date and Time</label>
        <input type="datetime-local" id="dt" required><br><br>

        <label for="file">Upload file</label>
        <input type="file" id="file" required><br><br>

        <label for="nationality">Account for your Nationality</label>
        <!--Dropdown-->

        <select name="" id="nationality">

            <option value=""disabled>--Acccount for One</option>
            <option value="">Italian</option>
            <option value="">Kenyan</option>
            <option value="">French</option>
            <option value="">Spanish</option>
            <option value="">South African</option>

        </select><br><br>

        <!--End of dropdown-->

        <label>Account for you Gender :</label><br>

        <input type="radio" id="male" name="gender">
        <label for="male">Male</label> <br>
        
          <input type="radio" id="female" name="gender">
        <label for="female">Female</label> <br>

          <input type="radio" id="other" name="gender">
        <label for="other">Other</label> <br>


        <br>

        <label for="">Account for a Web Programming Languages</label><br>
        

          <input type="checkbox" id="php" name="php">
        <label for="php">PHP</label> <br>

         <input type="checkbox" id="p" name="p">
        <label for="python">Python</label> <br>

         <input type="checkbox" id="swift" name="swift">
        <label for="swift">Swift</label> <br><br><br>

        <label for="message">Account for Message</label><br>

        <textarea name="" id="" cols="70" rows="6" placeholder="type here"></textarea><br><br><br>

        <button type="submit">Begin your Journey</button>

         

<br><br><br><br><br><br><br><br>
        
        


















    </form>







</head>

</body>
</html>
