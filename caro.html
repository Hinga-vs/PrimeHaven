<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <script src="bootstrap/js/bootstrap.min.js"></script>
</head>
<body>

<!-- Carousel -->
<div id="pic" class="carousel slide" data-bs-ride="carousel">

  <!-- Indicators/dots -->
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#pic" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#pic" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#pic" data-bs-slide-to="2"></button>
  </div>
  
  <!-- The slideshow/carousel -->
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="images/E2.jpeg" alt="" class="d-flex container" style="width:40%">
    </div>
    <div class="carousel-item">
      <img src="images/E1.jpeg" alt="" class="d-flex container" style="width:40%">
    </div>
    <div class="carousel-item">
      <img src="images/E3.jpeg" alt="" class="d-flex container" style="width:40%">
    </div>
  </div>
  
  <!-- Left and right controls/icons -->
  <button class="carousel-control-prev" type="button" data-bs-target="#pic" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#pic" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

<div class="container-fluid mt-3">
  <h3>Carousel Example</h3>
  <p>The following example shows how to create a basic carousel with indicators and controls.</p>
</div>

</body>
</html>
